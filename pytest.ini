[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -p no:cacheprovider
markers =
    slow: marks tests as slow (CP-SAT runs etc.)
    integration: integration tests touching multiple modules
    property: property-based tests via hypothesis
